<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ارتقا به کاربر ویژه | رندرنت</title>
    <style>
        @font-face { font-family: 'Vazir'; src: url('assets/fonts/Vazir.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }
        @font-face { font-family: 'Vazir'; src: url('assets/fonts/Vazir-Bold.woff2') format('woff2'); font-weight: 700; font-style: normal; font-display: swap; }
        body { background: #f9fafb; font-family: 'Vazir', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #1f2937; }
        .container { background: white; padding: 35px; border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); width: 100%; max-width: 450px; border: 1px solid #e5e7eb; text-align: center; }
        h2 { color: #f59e0b; margin-bottom: 20px; }
        p { color: #4b5563; margin-bottom: 20px; }
        .price { font-size: 2rem; font-weight: 800; color: #f59e0b; margin: 20px 0; }
        .btn { display: inline-block; padding: 12px 30px; background: #f59e0b; color: white; border-radius: 30px; text-decoration: none; font-weight: 700; transition: 0.2s; cursor: pointer; }
        .btn:hover { background: #d97706; }
        .error { display: none; background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 10px; margin-top: 15px; }
        .success { display: none; background: #e6f9f3; color: #00a878; padding: 12px; border-radius: 10px; margin-top: 15px; }
        .back-link { display: block; margin-top: 20px; color: #5b3cc4; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>⭐ ارتقا به کاربر ویژه</h2>
        <p>با پرداخت حق عضویت، از تخفیف ۱۰٪ در تمام سفارشات و سایر مزایا بهره‌مند شوید.</p>
        <div class="price">۵۰۰,۰۰۰ تومان</div>
        <button class="btn" onclick="upgrade()">پرداخت و ارتقا</button>
        <div class="error" id="errorMsg">⚠️ اعتبار شما کافی نیست. ابتدا کیف پول خود را شارژ کنید.</div>
        <div class="success" id="successMsg">✅ حساب شما با موفقیت به کاربر ویژه ارتقا یافت!</div>
        <a href="customer-panel.html" class="back-link">← بازگشت به داشبورد</a>
    </div>
    <script>
        const phone = localStorage.getItem('currentUserPhone');
        if (!phone) { window.location.href = 'customer-login.html'; }

        function upgrade() {
            const creditKey = 'credit_' + phone;
            let currentCredit = parseInt(localStorage.getItem(creditKey) || '250000');
            const upgradeCost = 500000;

            if (currentCredit < upgradeCost) {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('successMsg').style.display = 'none';
                return;
            }

            // کسر هزینه ارتقا
            const newCredit = currentCredit - upgradeCost;
            localStorage.setItem(creditKey, newCredit.toString());

            // تغییر سطح کاربر در registeredUsers
            let users = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
            const userIndex = users.findIndex(u => u.phone === phone);
            if (userIndex !== -1) {
                users[userIndex].level = 'ویژه';
                localStorage.setItem('registeredUsers', JSON.stringify(users));
            }

            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('successMsg').style.display = 'block';
            // مخفی کردن دکمه
            document.querySelector('.btn').style.display = 'none';
        }
    </script>
</body>
</html>
