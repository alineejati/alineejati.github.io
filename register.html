<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت‌نام | رندرنت</title>
    <style>
        @font-face { font-family: 'Vazir'; src: url('assets/fonts/Vazir.woff2') format('woff2'); font-weight: 400; font-style: normal; font-display: swap; }
        @font-face { font-family: 'Vazir'; src: url('assets/fonts/Vazir-Bold.woff2') format('woff2'); font-weight: 700; font-style: normal; font-display: swap; }
        body { background: #f9fafb; font-family: 'Vazir', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #1f2937; }
        .register-box { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.08); width: 100%; max-width: 450px; border: 1px solid #e5e7eb; }
        h2 { color: #5b3cc4; text-align: center; margin-bottom: 25px; }
        label { font-weight: 600; display: block; margin-bottom: 6px; color: #374151; }
        input, select { width: 100%; padding: 12px; margin-bottom: 18px; background: #f3f4f6; border: 1px solid #e5e7eb; border-radius: 10px; font-family: 'Vazir', Tahoma, sans-serif; font-size: 1rem; }
        button { width: 100%; padding: 14px; background: #5b3cc4; border: none; color: white; font-size: 1rem; font-weight: bold; border-radius: 30px; cursor: pointer; font-family: 'Vazir', Tahoma, sans-serif; transition: 0.2s; }
        button:hover { background: #7c5fe6; }
        .success-msg { display: none; background: #e6f9f3; color: #00a878; padding: 12px; border-radius: 10px; margin-top: 15px; text-align: center; font-weight: 600; }
        .error-msg { display: none; background: #fee2e2; color: #dc2626; padding: 12px; border-radius: 10px; margin-top: 15px; text-align: center; font-weight: 600; }
        .login-link { display: block; text-align: center; margin-top: 20px; color: #5b3cc4; text-decoration: none; }
    </style>
</head>
<body>
    <div class="register-box">
        <h2>📝 ثبت‌نام در رندرنت</h2>
        <form id="registerForm">
            <label>نام و نام خانوادگی</label>
            <input type="text" id="name" placeholder="مثال: سارا محمدی" required>
            <label>شماره تلفن</label>
            <input type="text" id="phone" placeholder="۰۹۱۲۳۴۵۶۷۸۹" required>
            <label>رمز عبور</label>
            <input type="password" id="password" placeholder="حداقل ۴ کاراکتر" required>
            <label>سطح مشتری</label>
            <select id="level">
                <option value="معمولی">معمولی</option>
                <option value="ویژه">ویژه (کاربر حرفه‌ای)</option>
            </select>
            <button type="submit">ثبت‌نام</button>
        </form>
        <div class="success-msg" id="successMsg">✅ ثبت‌نام با موفقیت انجام شد! اکنون می‌توانید وارد شوید.</div>
        <div class="error-msg" id="errorMsg">⚠️ این شماره تلفن قبلاً ثبت شده است.</div>
        <a href="customer-login.html" class="login-link">قبلاً ثبت‌نام کرده‌اید؟ وارد شوید</a>
    </div>
    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            const level = document.getElementById('level').value;

            if (!name || !phone || !password) {
                alert('لطفاً همه فیلدها را پر کنید.');
                return;
            }

            let users = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
            if (users.find(u => u.phone === phone)) {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('successMsg').style.display = 'none';
                return;
            }

            // تنظیم اعتبار اولیه بر اساس سطح
            const initialCredit = (level === 'ویژه') ? 500000 : 250000;

            users.push({
                name: name,
                phone: phone,
                password: password,
                level: level,
                joinDate: new Date().toLocaleDateString('fa-IR')
            });
            localStorage.setItem('registeredUsers', JSON.stringify(users));

            // ذخیره اعتبار جداگانه
            const creditKey = 'credit_' + phone;
            localStorage.setItem(creditKey, initialCredit.toString());

            document.getElementById('successMsg').style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('registerForm').reset();
        });
    </script>
</body>
</html>
