<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود | رندرنت</title>
    <style>
        @font-face {
            font-family: 'Vazir';
            src: url('assets/fonts/Vazir.woff2') format('woff2');
            font-weight: 400; font-style: normal; font-display: swap;
        }
        @font-face {
            font-family: 'Vazir';
            src: url('assets/fonts/Vazir-Bold.woff2') format('woff2');
            font-weight: 700; font-style: normal; font-display: swap;
        }
        body {
            background: #f9fafb;
            font-family: 'Vazir', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #1f2937;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            border: 1px solid #e5e7eb;
            text-align: center;
        }
        h2 { color: #5b3cc4; margin-bottom: 25px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            font-family: 'Vazir', Tahoma, sans-serif;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #5b3cc4;
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            font-family: 'Vazir', Tahoma, sans-serif;
            transition: 0.2s;
        }
        button:hover { background: #7c5fe6; }
        .error {
            color: #dc2626;
            background: #fee2e2;
            padding: 10px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }
        .register-link {
            display: block;
            margin-top: 20px;
            color: #5b3cc4;
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
        }
        .register-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>👤 ورود به پنل مشتری</h2>
        <input type="text" id="phone" placeholder="شماره تلفن (۰۹۱۲۳۴۵۶۷۸۹)">
        <input type="password" id="password" placeholder="رمز عبور">
        <button onclick="login()">ورود</button>
        <div class="error" id="errorMsg">⚠️ شماره تلفن یا رمز عبور اشتباه است.</div>
        <a href="register.html" class="register-link">ثبت‌نام نکرده‌اید؟ همین حالا ثبت‌نام کنید</a>
    </div>
    <script>
        function login() {
            const phone = document.getElementById('phone').value.trim();
            const pass = document.getElementById('password').value;
            const users = JSON.parse(localStorage.getItem('registeredUsers') || '[]');
            const user = users.find(u => u.phone === phone && u.password === pass);
            if (user) {
                localStorage.setItem('currentUserPhone', phone);
                window.location.href = 'customer-panel.html';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
            }
        }
    </script>
</body>
</html>
