<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود به پنل ادمین | رندرنت</title>
    <style>
        @font-face {
            font-family: 'Vazir';
            src: url('assets/fonts/Vazir.woff2') format('woff2');
            font-weight: 400; font-style: normal; font-display: swap;
        }
        @font-face {
            font-family: 'Vazir';
            src: url('assets/fonts/Vazir-Bold.woff2') format('woff2');
            font-weight: 700; font-style: normal; font-display: swap;
        }
        body {
            background: #f9fafb;
            font-family: 'Vazir', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #1f2937;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 400px;
            border: 1px solid #e5e7eb;
            text-align: center;
        }
        h2 {
            margin-bottom: 20px;
            color: #f59e0b;
            font-size: 1.5rem;
        }
        p {
            color: #6b7280;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0 20px;
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            font-family: 'Vazir', Tahoma, sans-serif;
            font-size: 1rem;
            text-align: center;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #f59e0b;
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Vazir', Tahoma, sans-serif;
            transition: 0.2s;
        }
        button:hover {
            background: #d97706;
        }
        .note {
            margin-top: 15px;
            font-size: 0.8rem;
            color: #9ca3af;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>⚙️ ورود به پنل ادمین</h2>
        <p>برای مشاهده دمو روی دکمه زیر کلیک کنید.</p>
        <input type="text" value="admin" disabled>
        <input type="password" value="••••••" disabled>
        <button onclick="location.href='admin-panel.html'">ورود به پنل مدیریت</button>
        <div class="note">داده‌ها نمایشی (Mock) می‌باشند</div>
    </div>
</body>
</html>
